# ============================================
# Docker Compose - Serviço PDF DECIFRA
# ============================================

services:
  # ==========================================
  # Serviço Node.js (API)
  # ==========================================
  pdf-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decifra-pdf-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GOTENBERG_URL=http://gotenberg:3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENABLE_STORAGE_UPLOAD=${ENABLE_STORAGE_UPLOAD:-true}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-pdfs}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL}
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      gotenberg:
        condition: service_healthy
    networks:
      - pdf-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Gotenberg - Conversor HTML para PDF
  # ==========================================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: decifra-gotenberg
    restart: unless-stopped
    # Ports exposto apenas internamente (não expor publicamente)
    # Acessível apenas via network interna
    expose:
      - "3000"
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--api-timeout=60s"
      - "--chromium-auto-start=true"
      - "--chromium-restart-after=100"
      - "--chromium-max-queue-size=10"
      - "--chromium-allow-list=file:///tmp/.*"
      # Limites de recursos para segurança
      - "--chromium-max-processes=4"
    networks:
      - pdf-network
    # Limites de recursos
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  pdf-network:
    driver: bridge

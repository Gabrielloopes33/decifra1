# ============================================
# Configuração Nginx para Serviço PDF
# ============================================
# Use este arquivo se precisar de configuração
# avançada no Nginx (proxy reverso)

upstream pdf_service {
    server localhost:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name pdf.decifra.app;
    
    # Redirect HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pdf.decifra.app;

    # SSL (certbot ou manual)
    ssl_certificate /etc/letsencrypt/live/pdf.decifra.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdf.decifra.app/privkey.pem;
    
    # SSL seguro
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Logs
    access_log /var/log/nginx/pdf-access.log;
    error_log /var/log/nginx/pdf-error.log;

    # Limite de tamanho do body (10MB)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint (público)
    location /health {
        proxy_pass http://pdf_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache do health check
        expires 10s;
        add_header Cache-Control "public, no-transform";
    }

    # API endpoints
    location /api/ {
        proxy_pass http://pdf_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        # Rate limiting (requer ngx_http_limit_req_module)
        # limit_req zone=pdf_limit burst=10 nodelay;
        
        # Prevenir caching de respostas da API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # OPTIONS para CORS preflight
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
        
        proxy_pass http://pdf_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Rate limiting (opcional)
# http {
#     limit_req_zone $binary_remote_addr zone=pdf_limit:10m rate=10r/m;
# }
